name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Quality gate. The deploy job depends on this, so a failure here blocks
  # production: the pipeline MUST NOT deploy if any check fails.
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      # The sanitize-video test (supabase/functions/sanitize-video/mp4.test.ts)
      # shells out to ffmpeg to build fixtures and assert GPS/EXIF stripping.
      # ffmpeg is not preinstalled on ubuntu-latest, so install it before tests
      # or that security-path test fails with `spawnSync ffmpeg ENOENT`.
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  # Deploys to Vercel production. `needs: quality` is the gate — this job is
  # skipped entirely if quality fails, and it only runs on main. The deploy
  # steps no-op until VERCEL_TOKEN is set, so main stays green before the
  # secret is provisioned.
  deploy:
    needs: quality
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Check Vercel credentials
        id: check
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::notice::VERCEL_TOKEN not set — skipping deploy. Add the secret to enable production deploys."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.check.outputs.enabled == 'true'
        uses: actions/checkout@v4
      - if: steps.check.outputs.enabled == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - if: steps.check.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
      # `vercel build` detects pnpm-lock.yaml and shells out to pnpm to install,
      # so pnpm must be on PATH here too (the quality job has it, this job didn't)
      # — without it the build fails with `spawn pnpm ENOENT`.
      - if: steps.check.outputs.enabled == 'true'
        run: npm install -g vercel@latest
      - if: steps.check.outputs.enabled == 'true'
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
      - if: steps.check.outputs.enabled == 'true'
        run: vercel build --prod --token="$VERCEL_TOKEN"
      - if: steps.check.outputs.enabled == 'true'
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
